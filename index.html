<!-- Container for the React app -->
<div id="cade-pitch-deck-root" style="width: 100%; height: 100vh; position: relative;"></div>

<!-- 1. Load React and ReactDOM from CDN -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<!-- 2. Load Babel to compile JSX in the browser -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- 3. The React Application -->
<script type="text/babel">
  const { useState, useEffect } = React;

  const C = { bg:"#FEF9EF", copper:"#C78F56", dark:"#1a1a1a", gray:"#595959", lgray:"#999999", xlight:"#e8e8e0", white:"#F5EEE2", black:"#0a0a0a", success:"#1A8754", copperLight:"#E8C9A0", copperBg:"rgba(199,143,86,.08)", red:"#DC2626" };
  const mono="'Roboto Mono',monospace", serif="'Playfair Display',serif", sans="'Montserrat',sans-serif";

  function Lbl({children,style,className=""}){return <span className={className} style={{fontFamily:mono,fontSize:"clamp(11px, 1vw, 14px)",fontWeight:400,letterSpacing:3,color:C.gray,textTransform:"uppercase",display:"block",...style}}>{children}</span>}
  function Num({n,style,className=""}){return <span className={className} style={{fontFamily:sans,fontSize:16,fontWeight:700,color:C.copper,display:"inline-block",width:40,height:40,lineHeight:"40px",textAlign:"center",borderRadius:10,background:C.copperBg,...style}}>{n}</span>}
  function Card({children,style,accent,className=""}){return <div className={`card ${className}`} style={{background:C.white,borderRadius:24,padding:"40px 48px",boxShadow:"0 4px 24px rgba(0,0,0,.03)",border:`1px solid ${C.xlight}`,borderTop:accent?`4px solid ${accent}`:undefined,...style}}>{children}</div>}
  function BigStat({num,label,sub,color=C.dark,className="",style}){return <div className={className} style={{textAlign:"center",flex:"1 1 220px",minWidth:200,...style}}><div className="big-stat-num" style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(64px,9vw,110px)",fontStyle:"italic",color,lineHeight:1}}>{num}</div><div style={{fontFamily:sans,fontSize:"clamp(18px, 1.8vw, 24px)",fontWeight:600,color:C.dark,marginTop:16}}>{label}</div>{sub&&<div style={{fontFamily:sans,fontSize:"clamp(14px, 1.2vw, 18px)",color:C.lgray,marginTop:8}}>{sub}</div>}</div>}

  const slide={minHeight:"100vh",padding:"clamp(64px,8vh,120px) clamp(32px,5vw,100px) clamp(40px,6vh,100px)",display:"flex",flexDirection:"column",justifyContent:"center",scrollSnapAlign:"start",position:"relative",boxSizing:"border-box"};

  function PitchDeck() {
    const [cur,setCur]=useState(0);
    const total=18;

    useEffect(()=>{
      const el=document.getElementById("deck");
      if(!el)return;
      
      // Observer to track which slide is currently in the middle of the screen
      const sections = el.querySelectorAll("section");
      const slideObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const index = Array.from(sections).indexOf(entry.target);
            if (index !== -1) setCur(index);
          }
        });
      }, { 
        root: el, 
        rootMargin: "-49% 0px -49% 0px" // Triggers exactly when a slide crosses the center of the screen
      });

      sections.forEach(sec => slideObserver.observe(sec));

      // Observer for the text animations
      const animObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
          } else {
            entry.target.classList.remove('is-visible');
          }
        });
      }, { root: el, threshold: 0.15 });

      document.querySelectorAll('.animate-up').forEach(node => animObserver.observe(node));

      return () => {
        slideObserver.disconnect();
        animObserver.disconnect();
      };
    },[]);

    return(
      <div id="deck" style={{fontFamily:sans,background:C.bg,color:C.dark,height:"100vh",overflowY:"auto",scrollSnapType:"y mandatory",position:"absolute", top:0, left:0, right:0, bottom:0}}>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@400;500;600;700&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet"/>
        
        <style>{`
          * { box-sizing: border-box; }
          h1, h2, h3 { font-weight: 400 !important; }
          .animate-up {
            opacity: 0;
            transform: translateY(32px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: opacity, transform;
          }
          .animate-up.is-visible {
            opacity: 1;
            transform: translateY(0);
          }
          #deck::-webkit-scrollbar { display: none; }
          #deck { -ms-overflow-style: none; scrollbar-width: none; }
          #deck .fixed-bottom { position: fixed; bottom: 40px; right: 48px; }
          #deck .fixed-top { position: fixed; top: 0; left: 0; right: 0; }
          
          /* Mobile Responsiveness Rules */
          @media (max-width: 768px) {
            #deck { scroll-snap-type: none !important; }
            #deck > section { 
              scroll-snap-align: none !important; 
              padding: 100px 24px 80px 24px !important;
              height: auto !important;
              min-height: 100vh !important;
            }
            .mobile-stack { flex-direction: column !important; gap: 24px !important; }
            .mobile-stack > * { flex: 1 1 100% !important; min-width: 100% !important; width: 100% !important; }
            .mobile-stack-center { flex-direction: column !important; text-align: center !important; align-items: center !important; }
            .mobile-stack-center > div { text-align: center !important; }
            
            .card { padding: 28px !important; min-width: 100% !important; width: 100% !important; }
            
            /* Typography fallbacks for mobile */
            h1 { font-size: 44px !important; line-height: 1.1 !important; }
            h2 { font-size: 36px !important; line-height: 1.2 !important; }
            h3 { font-size: 24px !important; }
            p { font-size: 16px !important; line-height: 1.6 !important; }
            .big-stat-num { font-size: 56px !important; }
            
            .timeline-card { flex-direction: column !important; align-items: flex-start !important; gap: 16px !important; }
            .timeline-divider { display: none !important; }
            .econ-row { flex-direction: column !important; gap: 20px !important; }
            .econ-row > div { width: 100% !important; min-width: 100% !important; }
            
            #deck .fixed-bottom { right: 24px !important; bottom: 24px !important; }
            #deck .fixed-top { padding: 0 24px !important; height: 64px !important; }
            table th, table td { padding: 12px 10px !important; font-size: 14px !important; }
          }
        `}</style>

        {/* Page indicator */}
        <div className="fixed-bottom" style={{fontFamily:mono,fontSize:14,fontWeight:400,color:C.lgray,zIndex:100,background:"rgba(254,249,239,.85)",backdropFilter:"blur(12px)",padding:"10px 20px",borderRadius:24,border:"1px solid rgba(0,0,0,.06)"}}>{String(cur+1).padStart(2,"0")} / {total}</div>

        {/* Logo bar */}
        <div className="fixed-top" style={{height:80,display:"flex",alignItems:"center",padding:"0 clamp(32px,5vw,100px)",zIndex:100,background:"rgba(254,249,239,.9)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(0,0,0,.04)"}}>
          <img src="https://imagedelivery.net/qJvpJU9hpeX3lEcmqZfcwg/ea71bdc8-b2c0-4c20-b8a2-e702a7164900/public" alt="CADE Medical" style={{height: 40}} />
        </div>

        {/* ═══ 01 COVER ═══ */}
        <section style={{...slide,background:C.bg,paddingTop:80,alignItems:"center",textAlign:"center"}}>
          <div style={{maxWidth:1100}}>
            <h1 className="animate-up" style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(56px,8vw,110px)",fontStyle:"italic",color:C.dark,lineHeight:1.05,letterSpacing:"-.03em",margin:"0 0 32px",transitionDelay:"0ms"}}>Care between visits<br/>you can <span style={{color:C.copper}}>count on</span></h1>
            <p className="animate-up" style={{fontFamily:sans,fontSize:"clamp(20px, 2vw, 32px)",color:C.gray,lineHeight:1.7,maxWidth:700,margin:"0 auto 56px",transitionDelay:"100ms"}}>Measured. Managed. Reimbursed.</p>
            <div className="animate-up mobile-stack-center" style={{display:"flex",justifyContent:"center",alignItems:"center",gap:32,transitionDelay:"200ms",textAlign:"left"}}>
              <img src="https://imagedelivery.net/qJvpJU9hpeX3lEcmqZfcwg/051e0f36-cdce-4883-cbc4-1052def32800/public" alt="Accelerated Urgent Care" style={{height: 64, objectFit: "contain"}} />
              <div>
                <div style={{fontFamily:sans,fontSize:"clamp(18px, 1.8vw, 26px)",fontWeight:600}}>Hunter Erickson</div>
                <div style={{fontFamily:sans,fontSize:"clamp(16px, 1.5vw, 22px)",color:C.gray}}>Director of Business Development</div>
                <div style={{fontFamily:mono,fontSize:"clamp(12px, 1.2vw, 16px)",fontWeight:400,color:C.lgray,textTransform:"uppercase",letterSpacing:1.5,marginTop:6}}>16 LOCATIONS + TELEHEALTH</div>
              </div>
            </div>
          </div>
          <div style={{position:"absolute",bottom:48,left:0,right:0,textAlign:"center"}}>
            <Lbl style={{fontSize:12,color:C.lgray}}>CONFIDENTIAL | APRIL 2026</Lbl>
          </div>
        </section>

        {/* ═══ 02 THE WHY - STATEMENT ═══ */}
        <section style={{...slide,background:C.bg}}>
          <Num n="02" className="animate-up" style={{transitionDelay:"0ms"}}/>
          <h2 className="animate-up" style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(44px,6vw,84px)",fontStyle:"italic",color:C.dark,lineHeight:1.1,margin:"32px 0 36px",maxWidth:1200,transitionDelay:"100ms"}}>Your patients chose you.<br/>Now give them the care<br/>they're <span style={{color:C.copper}}>missing</span></h2>
          <p className="animate-up" style={{fontFamily:sans,fontSize:"clamp(20px, 2vw, 32px)",color:C.gray,lineHeight:1.8,maxWidth:1000,transitionDelay:"200ms"}}>Traditionally, urgent care would not be the ideal candidate for a Connected Care program. The model is built on episodic visits - come in, get treated, go home. No follow-up. No continuity.</p>
          <p className="animate-up" style={{fontFamily:sans,fontSize:"clamp(20px, 2vw, 32px)",color:C.gray,lineHeight:1.8,maxWidth:1000,marginTop:24,transitionDelay:"300ms"}}>But AUC isn't operating like a traditional urgent care anymore.</p>
        </section>

        {/* ═══ 03 THE WHY - DATA ═══ */}
        <section style={{...slide,background:C.bg}}>
          <Num n="03" className="animate-up" style={{transitionDelay:"0ms"}}/>
          <h2 className="animate-up" style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(40px,5vw,72px)",fontStyle:"italic",color:C.dark,lineHeight:1.12,margin:"32px 0 36px",maxWidth:1100,transitionDelay:"100ms"}}>191,894 patients have chosen AUC as their <span style={{color:C.copper}}>primary care provider</span></h2>
          <p className="animate-up" style={{fontFamily:sans,fontSize:"clamp(18px, 1.8vw, 28px)",color:C.gray,lineHeight:1.75,maxWidth:900,marginBottom:48,transitionDelay:"200ms"}}>They visited your locations 3 or more times over the past three years. They didn't go to a PCP. They didn't establish care somewhere else. They came back to you - and right now, no one is managing their chronic conditions between visits.</p>
          <Card className="animate-up" style={{maxWidth:1000,borderLeft:`4px solid ${C.copper}`,transitionDelay:"300ms",padding:"48px"}}>
            <p style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(24px, 2.5vw, 36px)",fontStyle:"italic",color:C.dark,lineHeight:1.5,margin:0}}>AUC is in a unique position to reach a patient population that might not otherwise get access to a program like this - because for many of them, AUC is the only care relationship they have.</p>
          </Card>
        </section>

        {/* ═══ 04 THE 2026 LANDSCAPE ═══ */}
        <section style={{...slide,background:C.bg}}>
          <Num n="04" className="animate-up" style={{transitionDelay:"0ms"}}/>
          <Lbl className="animate-up" style={{marginTop:24,transitionDelay:"0ms"}}>THE 2026 LANDSCAPE</Lbl>
          <h2 className="animate-up" style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(40px,5vw,72px)",fontStyle:"italic",color:C.dark,lineHeight:1.12,margin:"20px 0 40px",maxWidth:1100,transitionDelay:"100ms"}}>New flexible codes.<br/>Less red tape. <span style={{color:C.copper}}>More opportunity.</span></h2>
          
          <div className="animate-up mobile-stack" style={{display:"flex",flexWrap:"wrap",gap:32,maxWidth:1300,marginBottom:40,transitionDelay:"200ms"}}>
            <p style={{fontFamily:sans,fontSize:"clamp(18px, 1.8vw, 28px)",color:C.gray,lineHeight:1.65,margin:"0 0 16px",width:"100%"}}>Driven by the Trump administration's MAGA-aligned push to cut bureaucratic red tape, the 2026 introduction of flexible new billing codes has fundamentally shifted the economics of remote care.</p>
            
            <Card style={{flex:"1 1 calc(50% - 32px)",minWidth:320,padding:"40px 48px",boxShadow:"none",background:"rgba(0,0,0,0.03)",border:"none"}} accent={C.lgray}>
              <Lbl style={{marginBottom:32}}>BEFORE 2026</Lbl>
              <div style={{display:"flex", alignItems:"flex-start", gap:24, marginBottom:32}}>
                <span style={{color:C.red, fontSize:40, fontWeight:700, lineHeight:1}}>↑</span>
                <div>
                  <div style={{fontFamily:sans, fontSize:"clamp(20px, 2vw, 28px)", fontWeight:600, color:C.dark}}>Higher Burden</div>
                  <div style={{fontFamily:sans, fontSize:"clamp(16px, 1.5vw, 22px)", color:C.gray, marginTop:8, lineHeight:1.5}}>Providers were required to gather more clinical minutes and excessive patient data.</div>
                </div>
              </div>
              <div style={{display:"flex", alignItems:"flex-start", gap:24}}>
                <span style={{color:C.red, fontSize:40, fontWeight:700, lineHeight:1}}>↓</span>
                <div>
                  <div style={{fontFamily:sans, fontSize:"clamp(20px, 2vw, 28px)", fontWeight:600, color:C.dark}}>Lower Reimbursement</div>
                  <div style={{fontFamily:sans, fontSize:"clamp(16px, 1.5vw, 22px)", color:C.gray, marginTop:8, lineHeight:1.5}}>Strict barriers kept billable amounts and financial incentives low.</div>
                </div>
              </div>
            </Card>

            <Card style={{flex:"1 1 calc(50% - 32px)",minWidth:320,padding:"40px 48px",boxShadow:"none",border:`1px solid ${C.copperLight}`}} accent={C.copper}>
              <Lbl style={{marginBottom:32, color:C.copper}}>2026 DEREGULATION</Lbl>
              <div style={{display:"flex", alignItems:"flex-start", gap:24, marginBottom:32}}>
                <span style={{color:C.success, fontSize:40, fontWeight:700, lineHeight:1}}>↓</span>
                <div>
                  <div style={{fontFamily:sans, fontSize:"clamp(20px, 2vw, 28px)", fontWeight:600, color:C.dark}}>Lower Burden</div>
                  <div style={{fontFamily:sans, fontSize:"clamp(16px, 1.5vw, 22px)", color:C.gray, marginTop:8, lineHeight:1.5}}>Requires significantly fewer minutes and far less data tracking to qualify.</div>
                </div>
              </div>
              <div style={{display:"flex", alignItems:"flex-start", gap:24}}>
                <span style={{color:C.success, fontSize:40, fontWeight:700, lineHeight:1}}>↑</span>
                <div>
                  <div style={{fontFamily:sans, fontSize:"clamp(20px, 2vw, 28px)", fontWeight:600, color:C.dark}}>Higher Reimbursement</div>
                  <div style={{fontFamily:sans, fontSize:"clamp(16px, 1.5vw, 22px)", color:C.gray, marginTop:8, lineHeight:1.5}}>Providers are able to bill more and generate higher revenue per patient.</div>
                </div>
              </div>
            </Card>
          </div>

          <div className="animate-up" style={{borderLeft:`4px solid ${C.copper}`,paddingLeft:32,maxWidth:1100,transitionDelay:"300ms"}}>
            <p style={{fontFamily:sans,fontSize:"clamp(20px, 2vw, 30px)",color:C.dark,lineHeight:1.7,margin:0}}>
              <strong>Why the shift?</strong> Medicare is actively increasing reimbursements because these programs have proven highly effective at preventing costly ER visits. This presents a massive opportunity to transition patients into proactive care while generating <strong>scalable, recurring revenue.</strong>
            </p>
          </div>
        </section>

        {/* ═══ 05 WHAT IS CONNECTED CARE ═══ */}
        <section style={{...slide,background:C.bg}}>
          <Num n="05" className="animate-up" style={{transitionDelay:"0ms"}}/>
          <Lbl className="animate-up" style={{marginTop:24,transitionDelay:"0ms"}}>WHAT IS CONNECTED CARE</Lbl>
          <h2 className="animate-up" style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(40px,5vw,72px)",fontStyle:"italic",color:C.dark,lineHeight:1.12,margin:"20px 0 40px",maxWidth:1000,transitionDelay:"100ms"}}>The infrastructure to care <span style={{color:C.copper}}>between visits</span></h2>
          <div className="mobile-stack" style={{display:"flex",flexWrap:"wrap",gap:24,maxWidth:1400}}>
            {[{a:"RPM",n:"Remote Patient Monitoring",d:"Blood pressure, glucose, weight, oxygen - connected devices transmit readings automatically to a clinical team."},
              {a:"CCM",n:"Chronic Care Management",d:"Monthly coordination for patients with 2+ chronic conditions. Care planning, medication review, proactive follow-up."},
              {a:"PCM",n:"Principal Care Management",d:"Monthly coordination for patients with a single, high-risk chronic condition. Specialized care planning and targeted follow-up."},
              {a:"RTM",n:"Remote Therapeutic Monitoring",d:"Tracking therapy adherence and treatment response. Common in MSK, respiratory, wound care."},
              {a:"AWVs",n:"Annual Wellness Visits",d:"Yearly preventative care visits to create or update a personalized prevention plan."}
            ].map((s,i)=>(
              <Card key={i} className="animate-up" style={{flex:"1 1 calc(50% - 24px)",minWidth:360,transitionDelay:`${i*100+200}ms`}} accent={C.copper}>
                <div style={{display:"flex",alignItems:"baseline",gap:16,marginBottom:16}}>
                  <span style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(32px, 3vw, 44px)",fontStyle:"italic",color:C.copper}}>{s.a}</span>
                  <span style={{fontFamily:sans,fontSize:"clamp(16px, 1.6vw, 24px)",fontWeight:600}}>{s.n}</span>
                </div>
                <p style={{fontFamily:sans,fontSize:"clamp(16px, 1.5vw, 22px)",color:C.gray,lineHeight:1.65,margin:0}}>{s.d}</p>
              </Card>
            ))}
          </div>
        </section>

        {/* ═══ 06 THE GAP ═══ */}
        <section style={{...slide,background:C.black}}>
          <Num n="06" className="animate-up" style={{background:"rgba(245,238,226,.1)",color:C.copperLight,transitionDelay:"0ms"}}/>
          <Lbl className="animate-up" style={{color:C.lgray,marginTop:24,transitionDelay:"0ms"}}>THE GAP</Lbl>
          <h2 className="animate-up" style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(40px,5vw,72px)",fontStyle:"italic",color:C.white,lineHeight:1.1,margin:"20px 0 56px",maxWidth:1000,transitionDelay:"100ms"}}>The system assumes<br/>someone else is <span style={{color:C.copper}}>watching</span></h2>
          <div className="mobile-stack" style={{display:"flex",flexWrap:"wrap",gap:24,maxWidth:1400}}>
            <Card className="animate-up" style={{flex:"1 1 calc(50% - 24px)",minWidth:360,transitionDelay:"200ms"}} accent={C.lgray}>
              <Lbl style={{fontSize:14,marginBottom:16}}>WHAT'S HAPPENING TODAY</Lbl>
              <p style={{fontFamily:sans,fontSize:"clamp(18px, 1.8vw, 26px)",color:C.gray,lineHeight:1.7,margin:0}}>A patient with hypertension visits AUC three times a year. They get treated, go home, and nobody checks their blood pressure until the next visit - or until they end up in the ER at 2am with a reading of 190/110.</p>
            </Card>
            <Card className="animate-up" style={{flex:"1 1 calc(50% - 24px)",minWidth:360,transitionDelay:"300ms"}} accent={C.copper}>
              <Lbl style={{fontSize:14,marginBottom:16}}>WHAT COULD BE HAPPENING</Lbl>
              <p style={{fontFamily:sans,fontSize:"clamp(18px, 1.8vw, 26px)",color:C.gray,lineHeight:1.7,margin:0}}>That same patient goes home with a connected BP cuff. A nurse reviews their readings daily, calls them weekly, and catches the upward trend at 155/95 - two weeks before it would have become a crisis.</p>
            </Card>
          </div>
        </section>

        {/* ═══ 07 PATIENT JOURNEY INTRO ═══ */}
        <section style={{...slide,background:C.copperBg}}>
          <div style={{maxWidth:1000}}>
            <Num n="07" className="animate-up" style={{transitionDelay:"0ms", marginBottom:24}}/>
            <Lbl className="animate-up" style={{marginBottom:20,transitionDelay:"100ms"}}>THE PROCESS</Lbl>
            <h2 className="animate-up" style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(56px,7vw,100px)",fontStyle:"italic",color:C.dark,lineHeight:1.05,margin:"0 0 32px",transitionDelay:"200ms"}}>The patient experience</h2>
            <p className="animate-up" style={{fontFamily:sans,fontSize:"clamp(24px, 2.5vw, 36px)",color:C.gray,lineHeight:1.7,transitionDelay:"300ms"}}>What Connected Care looks like from the patient's perspective - from the first conversation to ongoing, continuous care.</p>
          </div>
        </section>

        {/* ═══ 08 ZERO TOUCH MODEL ═══ */}
        <section style={{...slide,background:C.bg}}>
          <Num n="08" className="animate-up" style={{transitionDelay:"0ms"}}/>
          <Lbl className="animate-up" style={{marginTop:24,transitionDelay:"0ms"}}>ENGAGEMENT MODEL</Lbl>
          <h2 className="animate-up" style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(40px,5vw,72px)",fontStyle:"italic",color:C.dark,lineHeight:1.12,margin:"20px 0 48px",maxWidth:1000,transitionDelay:"100ms"}}>The <span style={{color:C.copper}}>Zero-Touch</span> Model</h2>
          
          <div className="animate-up mobile-stack" style={{display:"flex",flexWrap:"wrap",gap:48,alignItems:"center",transitionDelay:"200ms",maxWidth:1300}}>
            <div style={{flex:"1 1 600px"}}>
              <p style={{fontFamily:sans,fontSize:"clamp(20px, 2vw, 30px)",color:C.gray,lineHeight:1.7,margin:"0 0 32px"}}>Through seamless EHR API integration, CADE Medical's clinical staff automatically identifies and qualifies eligible patients. <strong>Your providers don't have to pitch the program or change their workflow.</strong></p>
              <p style={{fontFamily:sans,fontSize:"clamp(20px, 2vw, 30px)",color:C.gray,lineHeight:1.7,margin:0}}>CADE's team calls the patient directly. They explain the program in simple terms, answer questions, and collect verbal consent. Everything happens by phone.</p>
            </div>
            <Card accent={C.black} style={{flex:"1 1 400px", padding:"48px"}}>
              <div style={{fontFamily:serif,fontWeight:400,fontSize:"clamp(80px,9vw,130px)",fontStyle:"italic",color:C.dark,lineHeight:1}}>30%</div>
              <div style={{fontFamily:sans,fontSize:"clamp(20px, 2vw, 30px)",fontWeight:600,color:C.dark,marginTop:16}}>Average Adoption Rate</div>
              <p style={{fontFamily:sans,fontSize:"clamp(16px, 1.5vw, 22px)",color:C.gray,lineHeight:1.6,margin:"12px 0 0"}}>A baseline capture of eligible patients with absolutely zero provider effort required.</p>
            </Card>
          </div>

          <div className="animate-up mobile-stack" style={{display:"flex",flexWrap:"wrap",gap:24,marginTop:64,maxWidth:1500,transitionDelay:"300ms"}}>
            {[
              {ph:"DAY 3-7",t:"Device Arrives",d:"Cellular-connected device arrives. No WiFi pairing. No app download required."},
              {ph:"WEEKLY",t:"Care Team Check-Ins",d:"Assigned nurse calls every week to review trends and support the patient."},
